unbind r
bind -n M-r source-file ~/.config/tmux/tmux.conf

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# tmux prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mouse on
set -g renumber-windows on                        # close gaps when a window closes
set -g base-index 1
set-window-option -g mode-keys vi

# # vim copy/paste
if-shell 'test "$(uname -s)" = Darwin' 'set-option -g default-command "exec reattach-to-user-namespace -l zsh"'
bind -T copy-mode-vi v send-keys -X begin-selection
if-shell 'test "$(uname -s)" = Darwin' \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'"
if-shell 'test "$(uname -s)" = Darwin' \
  "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'" \
  "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'"
bind-key p paste-buffer

# # rebind keys
# session
bind R command-prompt -I "#S" { rename-session "%%" }
bind Q kill-session
# window
unbind '"'
unbind %
bind r command-prompt -I "#W" { rename-window "%%" }
bind q kill-window
bind t new-window -c "#{pane_current_path}"
bind -n M-h previous-window
bind -n M-l next-window

# pane
bind Enter split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -n M-H select-pane -L
bind -n M-J select-pane -D
bind -n M-K select-pane -U
bind -n M-L select-pane -R

bind -n M-S-Up      resize-pane -U 5
bind -n M-S-Down    resize-pane -D 5
bind -n M-S-Left    resize-pane -L 5
bind -n M-S-Right   resize-pane -R 5

# setup custom tokyonight moon theme
# forked from https://github.com/catppuccin/tmux
# configure 
set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{tmux_mode_indicator}"
# set -ga status-right "#[bg=default,fg=#{@thm_green}]  #(~/.config/tmux/plugins/tmux-repo-parent.sh '#{pane_current_path}') "
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]   #S },#{#[bg=default,fg=#{@thm_green}]   #S }}"
# set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]│"
# set -ga status-left "#[bg=default,fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=default,fg=#{@thm_blue}]   #{=/-32/...:#{s|$USER|~|:#(basename $(dirname #{pane_current_path}))}}"
set -ga status-left "#[bg=default,fg=#{@thm_blue}]/#{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=default,fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# # status right look and feel
set -g status-right-length 100
set -g status-right ""
# set -ga status-right "#[bg=default]  "
# set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_bg}]},#{#[bg=default,fg=#{@thm_pink}]}} #{battery_icon} #{battery_percentage} "
# set -ga status-right "#[bg=default,fg=#{@thm_overlay_0}, none]│"
# set -ga status-right "#[bg=default]#{?#{==:#{online_status},ok},#[fg=#{@thm_mauve}] 󰖩 on ,#[fg=#{@thm_red},bold]#[reverse] 󰖪 off }"
# set -ga status-right "#[bg=default,fg=#{@thm_overlay_0}, none]│"
# set -ga status-right "#[bg=default,fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "
set -ga status-right "#[bg=default,fg=#{@thm_sky}]   #(whoami) "
set -ga status-right "#[bg=default,fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=default,fg=#{@thm_rosewater}] 󰒋  #h "

# Configure Tmux
set -g status-position top
set -g status-style "bg=default"
set -g status-justify "absolute-centre"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=default,fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=default,fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=default,fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=default,fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=default,fg=#{@thm_overlay_0}]|"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"

# run tmux-suspend
# https://github.com/MunifTanjim/tmux-suspend
# remove colors from status line for suspended state
set -g @suspend_suspended_options " \
  status::off, \
  pane-border-format:: LOCAL TMUX SUSPENDED , \
"
run-shell ~/.config/tmux/plugins/tmux-suspend/suspend.tmux
